name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Python backend ---

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies and PyInstaller
        run: pip install -r requirements.txt pyinstaller

      - name: Build backend executable
        run: pyinstaller console_deck_pro.spec

      # --- Flutter UI ---

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: UI
        run: flutter pub get

      - name: Build Flutter Windows app
        working-directory: UI
        shell: pwsh
        env:
          SKIN_API_URL: ${{ secrets.SKIN_API_URL }}
          SKIN_API_KEY: ${{ secrets.SKIN_API_KEY }}
        run: |
          flutter build windows `
            --dart-define=SKIN_API_URL="$env:SKIN_API_URL" `
            --dart-define=SKIN_API_KEY="$env:SKIN_API_KEY"

      # --- Installer ---

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version "UI\setup.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Console Deck PRO ${{ github.ref_name }}"
          files: UI/Output/ConsoleDeckPro_Setup.exe
          generate_release_notes: true
