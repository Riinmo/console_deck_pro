name: console_deck_ui
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.8
  shared_preferences: ^2.3.5
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/images/console_cover.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

